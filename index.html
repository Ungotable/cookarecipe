<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef's Recipe | Cook A Recipe Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text-main); line-height: 1.6; }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white; padding: 3rem 1rem 5rem; text-align: center; box-shadow: var(--shadow);
        }
        header h1 { font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 0.5rem; }

        .container { max-width: 1400px; margin: -3rem auto 2rem; padding: 0 1rem; }

        .search-section {
            background: var(--card-bg); padding: 1.5rem; border-radius: 1rem;
            box-shadow: var(--shadow); margin-bottom: 2rem;
        }
        .search-bar input {
            width: 100%; padding: 1rem 1.5rem; border: 2px solid #e2e8f0;
            border-radius: 0.5rem; font-size: 1rem; transition: 0.3s;
        }
        .search-bar input:focus { border-color: var(--primary); outline: none; }
        .search-options { display: flex; gap: 1.5rem; margin-top: 1rem; font-size: 0.9rem; }

        .layout { 
            display: grid; 
            grid-template-columns: 280px 1fr 280px; 
            gap: 1.5rem; 
        }

        @media (max-width: 1100px) { 
            .layout { grid-template-columns: 1fr; } 
        }

        .pantry-sidebar, .recipe-search-sidebar {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 1.5rem;
        }

        .recipe-search-sidebar h2 { font-size: 1.2rem; margin-bottom: 1rem; color: var(--primary); }
        
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
        .input-group input { 
            width: 100%; 
            padding: 8px; 
            border: 1px solid #e2e8f0; 
            border-radius: 6px;
            font-family: inherit;
        }

        .mode-selector {
            margin: 15px 0; padding: 12px; background: #f1f5f9; border-radius: 8px; font-size: 0.85rem;
        }
        .mode-selector p { font-weight: 700; margin-bottom: 8px; color: var(--primary-dark); }
        .mode-selector label { display: block; cursor: pointer; margin-bottom: 5px; color: var(--text-muted); }
        .mode-selector input { margin-right: 8px; }

        #pantrySearch {
            width: 100%; padding: 0.6rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; border-radius: 0.4rem;
        }
        .checkbox-group { margin: 1rem 0; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .custom-checkbox { display: flex; align-items: center; padding: 6px 0; cursor: pointer; font-size: 0.85rem; }
        .custom-checkbox input { margin-right: 10px; }

        .btn-reset { 
            width: 100%; padding: 0.8rem; background: #fee2e2; color: #ef4444; 
            border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 600; 
        }

        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .recipe-card {
            background: var(--card-bg); border-radius: 1rem; padding: 1.5rem;
            box-shadow: var(--shadow); border-top: 5px solid var(--primary);
            transition: 0.3s; display: flex; flex-direction: column;
        }
        .recipe-card:hover { transform: translateY(-5px); }
        .rarity { color: #f59e0b; font-weight: bold; margin-bottom: 0.5rem; }
        .ingredients-list { list-style: none; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; flex-grow: 1; }
        .has-it { color: var(--accent); font-weight: 700; }
        .price { font-weight: 700; color: var(--accent); font-size: 1.2rem; border-top: 1px solid #f1f5f9; padding-top: 1rem; }
    </style>
</head>
<body>

    <header>
        <h1>🍳 Chef's Recipe</h1>
        <p>Select ingredients you have to find matching recipes</p>
    </header>

    <main class="container">
        <section class="search-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search recipes or ingredients...">
                <div class="search-options">
                    <label><input type="checkbox" id="searchByName" checked> Name</label>
                    <label><input type="checkbox" id="searchByIngredient" checked> Ingredients</label>
                </div>
            </div>
        </section>

        <div class="layout">
            <aside class="pantry-sidebar">
                <h2>My Pantry</h2>
                <div class="mode-selector">
                    <p>Search Mode:</p>
                    <label><input type="radio" name="pantryMode" value="any" checked> Contains any selected</label>
                    <label><input type="radio" name="pantryMode" value="full"> Only recipes I can cook</label>
                </div>
                <input type="text" id="pantrySearch" placeholder="Filter ingredient names...">
                <div id="ingredientsList" class="checkbox-group"></div>
                <button onclick="clearChecks()" class="btn-reset">Clear All Selections</button>
            </aside>

            <section class="recipe-results">
                <div style="margin-bottom: 1rem; font-weight: 600;">Showing <span id="recipeCount">0</span> Recipes</div>
                <div id="recipeContainer" class="recipe-grid"></div>
            </section>

            <aside class="recipe-search-sidebar">
                <h2>Search Recipe</h2>
                <p style="font-size: 0.75rem; margin-bottom: 1rem;">Find recipes containing these specific items:</p>
                <div id="ingredientInputs">
                    <div class="input-group"><label>Item 1</label><input type="text" class="recipe-ing-input" placeholder="e.g. Premium Meat"></div>
                    <div class="input-group"><label>Item 2</label><input type="text" class="recipe-ing-input" placeholder="e.g. Eggs"></div>
                    <div class="input-group"><label>Item 3</label><input type="text" class="recipe-ing-input"></div>
                    <div class="input-group"><label>Item 4</label><input type="text" class="recipe-ing-input"></div>
                    <div class="input-group"><label>Item 5</label><input type="text" class="recipe-ing-input"></div>
                </div>
                <button onclick="clearRecipeSearch()" class="btn-reset" style="margin-top: 10px;">Clear Search</button>
            </aside>
        </div>
    </main>

    <script>
        let recipes = [];
        let ingredientsSet = new Set();
        let selectedPantryItems = new Set();

        const searchInput = document.getElementById('searchInput');
        const pantrySearch = document.getElementById('pantrySearch');
        const searchByName = document.getElementById('searchByName');
        const searchByIngredient = document.getElementById('searchByIngredient');
        const recipeContainer = document.getElementById('recipeContainer');
        const ingredientsList = document.getElementById('ingredientsList');
        const countDisplay = document.getElementById('recipeCount');

        async function init() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/Ungotable/cookarecipe/refs/heads/main/Recipes.json');
                const data = await res.json();
                recipes = Object.values(data).flat();
                recipes.forEach(r => r.ingredients.forEach(ing => ingredientsSet.add(ing)));
                
                renderPantry();
                updateDisplay();
            } catch (err) {
                recipeContainer.innerHTML = "<p>Failed to load data.</p>";
            }
        }

        function renderPantry() {
            const filter = pantrySearch.value.toLowerCase();
            ingredientsList.innerHTML = "";
            [...ingredientsSet].sort().forEach(ing => {
                if (ing.toLowerCase().includes(filter)) {
                    const label = document.createElement('label');
                    label.className = "custom-checkbox";
                    const isChecked = selectedPantryItems.has(ing);
                    label.innerHTML = `<input type="checkbox" value="${ing}" ${isChecked ? 'checked' : ''}> <span>${ing}</span>`;
                    
                    label.querySelector('input').addEventListener('change', (e) => {
                        if (e.target.checked) selectedPantryItems.add(ing);
                        else selectedPantryItems.delete(ing);
                        updateDisplay();
                    });
                    ingredientsList.appendChild(label);
                }
            });
        }

        function updateDisplay() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const selectedArray = Array.from(selectedPantryItems);
            const mode = document.querySelector('input[name="pantryMode"]:checked').value;
            
            const rightSideInputs = Array.from(document.querySelectorAll('.recipe-ing-input'))
                                         .map(input => input.value.toLowerCase().trim())
                                         .filter(val => val !== "");
        
            const filtered = recipes.filter(recipe => {
                const textMatch = (searchByName.checked && recipe.name.toLowerCase().includes(searchTerm)) ||
                                 (searchByIngredient.checked && recipe.ingredients.some(i => i.toLowerCase().includes(searchTerm)));
                const textPass = !searchTerm || textMatch;
        
                let pantryPass = true;
                if (selectedArray.length > 0) {
                    if (mode === 'full') {
                        pantryPass = recipe.ingredients.every(ing => selectedArray.includes(ing));
                    } else {
                        pantryPass = recipe.ingredients.some(ing => selectedArray.includes(ing));
                    }
                }
        
                let rightSidePass = true;
                if (rightSideInputs.length > 0) {
                    rightSidePass = rightSideInputs.every(inputIng => 
                        recipe.ingredients.some(recipeIng => recipeIng.toLowerCase().includes(inputIng))
                    );
                }
        
                return textPass && pantryPass && rightSidePass;
            });
        
            renderCards(filtered, selectedArray, rightSideInputs, searchTerm);
        }
        
        function renderCards(data, selected, searchInputs, mainSearch) {
            recipeContainer.innerHTML = "";
            countDisplay.textContent = data.length;
        
            data.forEach(recipe => {
                const card = document.createElement('div');
                card.className = "recipe-card";
                
                const ingredientsHTML = recipe.ingredients.map(ing => {
                    const lowerIng = ing.toLowerCase();
                    
                    const isSelectedInPantry = selected.includes(ing);
                    const isMatchedInRightSidebar = searchInputs.some(s => lowerIng.includes(s));
                    const isMatchedInMainSearch = (mainSearch && searchByIngredient.checked && lowerIng.includes(mainSearch));
                    
                    const hasItem = isSelectedInPantry || isMatchedInRightSidebar || isMatchedInMainSearch;
                    
                    return `<li class="${hasItem ? 'has-it' : ''}">${hasItem ? '✓' : '•'} ${ing}</li>`;
                }).join('');
        
                card.innerHTML = `
                    <div class="rarity">${"★".repeat(recipe.rarity || 1)}</div>
                    <h3>${recipe.name}</h3>
                    <ul class="ingredients-list">
                        ${ingredientsHTML}
                    </ul>
                    <div class="price">$${recipe.money.toLocaleString()}</div>
                `;
                recipeContainer.appendChild(card);
            });
        }

        function clearChecks() {
            selectedPantryItems.clear();
            renderPantry();
            updateDisplay();
        }

        function clearRecipeSearch() {
            document.querySelectorAll('.recipe-ing-input').forEach(input => input.value = "");
            updateDisplay();
        }

        searchInput.addEventListener('input', updateDisplay);
        pantrySearch.addEventListener('input', renderPantry);
        searchByName.addEventListener('change', updateDisplay);
        searchByIngredient.addEventListener('change', updateDisplay);
        document.querySelectorAll('input[name="pantryMode"]').forEach(r => r.addEventListener('change', updateDisplay));
        document.querySelectorAll('.recipe-ing-input').forEach(input => {
            input.addEventListener('input', updateDisplay);
        });

        init();
    </script>
</body>
</html>
