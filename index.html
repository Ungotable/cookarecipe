<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cook a Recipe | Interactive Recipe Database</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>🍳 Chef's Recipe</h1>
            <p>Select ingredients you have to find matching recipes</p>
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search recipes or ingredients...">
                <div class="search-options">
                    <label style="cursor: pointer;"><input type="checkbox" id="searchByName" checked> Name</label>
                    <label style="cursor: pointer;"><input type="checkbox" id="searchByIngredient" checked> Ingredients</label>
                </div>
            </div>
        </section>

        <div class="layout">
            <aside class="pantry-sidebar">
                <div class="sticky-pantry">
                    <h2>My Pantry</h2>
                    <p class="subtitle">Isolate recipes containing ANY of these:</p>
                    
                    <input type="text" id="pantrySearch" placeholder="Filter ingredient names...">
                    
                    <div id="ingredientsList" class="checkbox-group">
                        <p style="font-size: 0.8rem; color: #94a3b8;">Loading pantry items...</p>
                    </div>
                    
                    <button onclick="clearChecks()" class="btn-reset">Clear All Selections</button>
                </div>
            </aside>

            <section class="recipe-results">
                <div class="results-header">
                    <span>Showing <span id="recipeCount">0</span> Recipes</span>
                </div>
                <div id="recipeContainer" class="recipe-grid">
                    </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
